<!DOCTYPE html>
<html>
<head><title>Generate PWA Icons</title></head>
<body style="background: #1a1a1a; color: white; font-family: sans-serif; padding: 20px;">
<h2>Right-click each canvas and "Save image as..." to create icons</h2>
<p>Save as <code>frontend/public/icon-192.png</code> and <code>frontend/public/icon-512.png</code></p>
<h3>192x192</h3>
<canvas id="c192" width="192" height="192"></canvas>
<h3>512x512</h3>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  const scale = s / 512;

  // Background
  ctx.fillStyle = '#0a0e17';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, 96 * scale);
  ctx.fill();

  // Bars
  const bars = [
    { x: 80, y: 320, w: 60, h: 120, color: '#3b82f6' },
    { x: 170, y: 240, w: 60, h: 200, color: '#10b981' },
    { x: 260, y: 180, w: 60, h: 260, color: '#6366f1' },
    { x: 350, y: 120, w: 60, h: 320, color: '#f59e0b' },
  ];
  bars.forEach(b => {
    ctx.fillStyle = b.color;
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.roundRect(b.x * scale, b.y * scale, b.w * scale, b.h * scale, 8 * scale);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Line
  const points = [[80, 280], [170, 200], [260, 140], [350, 80], [440, 60]];
  ctx.strokeStyle = '#e2e8f0';
  ctx.lineWidth = 4 * scale;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  points.forEach(([x, y], i) => {
    if (i === 0) ctx.moveTo(x * scale, y * scale);
    else ctx.lineTo(x * scale, y * scale);
  });
  ctx.stroke();

  // Dots
  ctx.fillStyle = '#e2e8f0';
  points.forEach(([x, y]) => {
    ctx.beginPath();
    ctx.arc(x * scale, y * scale, 6 * scale, 0, Math.PI * 2);
    ctx.fill();
  });
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
</script>
</body>
</html>
