version: "3.8"

services:
  portfolio:
    build: .
    container_name: portfolio-dashboard
    ports:
      - "8000:8000"
    volumes:
      - portfolio_data:/app/data
    environment:
      - DATABASE_PATH=/app/data/portfolio.db
      - AUTH_PIN_HASH=${AUTH_PIN_HASH}
      - JWT_SECRET=${JWT_SECRET}
      - REFRESH_HOUR=${REFRESH_HOUR:-16}
      - REFRESH_MINUTE=${REFRESH_MINUTE:-30}
    restart: unless-stopped

volumes:
  portfolio_data:
